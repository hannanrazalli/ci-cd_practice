name: dbt-Production-Deployment

on:
  push:
    branches: [main]

jobs:
  deploy_prod:
    runs-on: ubuntu-latest
    env:
      # Kita tetap guna secret kau yang asal
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }} 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Deploy to BigQuery Production
        run: |
          # 1. Masuk ke folder projek
          cd include/dbt/oms_dbt_proj
          
          # 2. Cipta fail key guna printf (Gaya selamat kau)
          printf "%s" "$GCP_SA_KEY" > /tmp/gcp-key.json
          
          # 3. Set env variable untuk dbt baca
          export PROD_KEY_PATH="/tmp/gcp-key.json"
          export GOOGLE_APPLICATION_CREDENTIALS="/tmp/gcp-key.json"
          
          # 4. Install dependencies
          dbt deps
          
          # 5. Run & Test (Paling Simple)
          # Kita guna --profiles-dir merujuk kepada root folder .github
          dbt run --target prod --profiles-dir ../../../.github/workflows/ci_profiles/ --full-refresh
          dbt test --target prod --profiles-dir ../../../.github/workflows/ci_profiles/
          
          # 6. Clean up
          rm /tmp/gcp-key.json